<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — ContactSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f2ee; --surface: #fff; --border: #e2ddd6;
    --text: #1a1814; --muted: #7a7570; --accent: #2d5be3;
    --danger: #c0392b;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .login-wrap {
    width: 100%;
    max-width: 400px;
    padding: 1rem;
  }
  .brand {
    text-align: center;
    margin-bottom: 2rem;
  }
  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
  }
  .brand h1 span { color: var(--accent); }
  .brand p {
    color: var(--muted);
    font-size: .875rem;
    margin-top: .35rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .form-group { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: .75rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: .35rem;
  }
  input {
    width: 100%;
    padding: .65rem .85rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .95rem;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,91,227,.1);
  }
  .btn-submit {
    width: 100%;
    padding: .7rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-top: .5rem;
    transition: background .15s;
  }
  .btn-submit:hover { background: #1e47cc; }
  .error {
    background: #fdf0ef;
    color: var(--danger);
    border: 1px solid #f5c6c3;
    border-radius: 7px;
    padding: .65rem .85rem;
    font-size: .85rem;
    margin-bottom: 1rem;
  }
  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: .75rem;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <h1>Contact<span>Sync</span></h1>
    <p>Company contact directory</p>
  </div>
  <div class="card">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit">Sign in</button>
    </form>
  </div>
  <p class="footer-note">Synced with Exchange Online via EWS</p>
</div>
</body>
</html>
