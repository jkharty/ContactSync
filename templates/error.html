{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<div style="max-width:480px; margin:4rem auto; text-align:center;">
  <div style="font-size:3rem; margin-bottom:1rem;">⚠</div>
  <h1 style="font-family:'DM Serif Display',serif; font-size:1.6rem; font-weight:400; margin-bottom:.75rem;">
    Something went wrong
  </h1>
  <p style="color:var(--muted); margin-bottom:1.5rem;">{{ message }}</p>
  <a href="{{ url_for('contacts') }}" class="btn btn-secondary">Go to contacts</a>
</div>
{% endblock %}
