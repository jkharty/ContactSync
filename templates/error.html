{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<div style="max-width:480px; margin:4rem auto; text-align:center;">
  <div style="font-size:3rem; margin-bottom:1rem;">⚠</div>
  <h1 class="page-title" style="margin-bottom:.75rem;">Something went wrong</h1>
  <p class="text-muted" style="margin-bottom:1.5rem;">{{ message }}</p>
  <a href="{{ url_for('contacts') }}" class="btn btn-secondary">Go to contacts</a>
</div>
{% endblock %}
